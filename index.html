<!DOCTYPE html>
<html>
<head>
  <title>Real-Time Collaboration Board</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .add-btn {
      width: 95%;
      padding: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    .add-btn:hover {
      background: #5a67d8;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    li {
      background: #f9f9f9;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      text-align: left;
      position: relative;
    }

    .username {
      font-weight: bold;
      color: #333;
    }

    .time {
      font-size: 11px;
      color: gray;
    }

    .delete-btn {
      position: absolute;
      right: 10px;
      top: 10px;
      background: red;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Collaboration Board</h2>

  <input type="text" id="username" placeholder="Your name">
  <input type="text" id="note" placeholder="Write a note...">
  <button class="add-btn" onclick="addNote()">Add Note</button>

  <ul id="notes"></ul>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWCexoDxe-0j6NjnMXf_PxfSlD8ZFvLYo",
  authDomain: "collaboration-board-ce5f6.firebaseapp.com",
  projectId: "collaboration-board-ce5f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Add note
function addNote() {
  const noteInput = document.getElementById("note");
  const userInput = document.getElementById("username");

  const note = noteInput.value.trim();
  const user = userInput.value.trim() || "Anonymous";

  if (note === "") return;

  db.collection("notes").add({
    text: note,
    user: user,
    time: Date.now()
  });

  noteInput.value = "";
}

// Enter key support
document.getElementById("note").addEventListener("keypress", function(e) {
  if (e.key === "Enter") addNote();
});

// Real-time listener
db.collection("notes").orderBy("time")
.onSnapshot(snapshot => {
  const list = document.getElementById("notes");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    const li = document.createElement("li");

    const date = new Date(data.time);

    li.innerHTML = `
      <span class="username">${data.user}</span>: ${data.text}<br>
      <span class="time">${date.toLocaleString()}</span>
      <button class="delete-btn" onclick="deleteNote('${doc.id}')">X</button>
    `;

    list.appendChild(li);
  });
});

// Delete note
function deleteNote(id) {
  db.collection("notes").doc(id).delete();
}
</script>

</body>
</html>
