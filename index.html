<!DOCTYPE html>
<html>
<head>
  <title>Real-Time Collaboration Board</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    h2 {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      list-style: none;
      padding: 0;
      max-width: 400px;
      margin: 20px auto;
    }

    li {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: left;
    }

    .time {
      font-size: 12px;
      color: gray;
    }

    .delete-btn {
      margin-top: 5px;
      background: red;
    }

    .delete-btn:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<h2>Real-Time Collaboration Board</h2>

<input type="text" id="username" placeholder="Your name">
<br>

<input type="text" id="note" placeholder="Write something...">
<button onclick="addNote()">Add</button>

<ul id="notes"></ul>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWCexoDxe-0j6NjnMXf_PxfSlD8ZFvLYo",
  authDomain: "collaboration-board-ce5f6.firebaseapp.com",
  projectId: "collaboration-board-ce5f6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Add note
function addNote() {
  const input = document.getElementById("note");
  const userInput = document.getElementById("username");

  const note = input.value.trim();
  const user = userInput.value.trim() || "Anonymous";

  if (note === "") return;

  db.collection("notes").add({
    text: note,
    user: user,
    time: Date.now()
  });

  input.value = "";
}

// Enter key support
document.getElementById("note").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    addNote();
  }
});

// Real-time listener
db.collection("notes").orderBy("time")
.onSnapshot(snapshot => {
  const list = document.getElementById("notes");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    const li = document.createElement("li");

    const date = new Date(data.time);

    li.innerHTML = `
      <strong>${data.user}:</strong> ${data.text}<br>
      <span class="time">${date.toLocaleString()}</span>
      <br>
      <button class="delete-btn" onclick="deleteNote('${doc.id}')">Delete</button>
    `;

    list.appendChild(li);
  });
});

// Delete note
function deleteNote(id) {
  db.collection("notes").doc(id).delete();
}
</script>

</body>
</html>
